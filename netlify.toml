# Netlify configuration for Cribxpert Admin (Vite + React SPA)

[build]
  command = "npm ci && npm run build"
  publish = "dist"

# SPA fallback: serve index.html for all routes so client-side routing works.
# Without this, direct visits or refresh on /dashboard, /login, etc. return 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
